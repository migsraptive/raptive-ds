name: Design Sync

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  design-sync:
    name: Export design system manifest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci

      - name: Upload design manifest
        uses: actions/upload-artifact@v4
        with:
          name: community-design-sync-manifest
          path: dist/design-sync/latest-main.json
          if-no-files-found: error
