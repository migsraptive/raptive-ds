schema_version: 0.1
name: Badge
status: pilot
source:
  repo: community-ds
  path: src/components/Badge/Badge.jsx
purpose: >
  Badge labels metadata, status, category, role, or lightweight achievement
  context. It is compact supporting information, not a primary interaction.
use_when:
  - A short label helps users scan status, type, category, or recognition.
  - Metadata needs visual grouping without becoming an action.
  - A removable chip-like label is needed.
do_not_use_for:
  - Primary calls to action.
  - Long explanatory text.
  - Navigation tabs or filters that need selected state.
  - Status that would be unclear without supporting text.
agent_rules:
  - Keep badge labels short.
  - Do not create new color variants without design review.
  - Do not use dot-only meaning; pair dots with text.
  - Use Button or TextLink for actions outside the removable affordance.
anatomy:
  - name: root
    required: true
    description: Inline label container.
  - name: label
    required: true
    description: Short visible text.
  - name: dot
    required: false
    description: Status accent that cannot carry meaning alone.
  - name: icon
    required: false
    description: Supporting symbol before the label.
  - name: remove_button
    required: false
    description: Optional affordance for removing the badge.
variants:
  default:
    description: Neutral metadata or uncategorized label.
    intent: neutral
  brand:
    description: Raptive-owned or brand-highlighted label.
    intent: brand
  success:
    description: Positive or confirmed status.
    intent: positive_status
  warning:
    description: Attention, pending, or caution state.
    intent: warning_status
  error:
    description: Error, failed, or blocked state.
    intent: error_status
  info:
    description: Informational status.
    intent: informational_status
  gold:
    description: Achievement, leaderboard, or special recognition.
    intent: achievement
  purple:
    description: Role, special recognition, or community distinction.
    intent: recognition
  outline:
    description: Neutral label when filled treatment would add too much weight.
    intent: quiet_neutral
sizes:
  xs:
    description: Dense metadata.
  sm:
    description: Default badge.
  md:
    description: Emphasized metadata or status label.
states:
  default:
    description: Static label.
  hover:
    description: Only applies to the removable affordance.
  focus_visible:
    description: Required for the removable affordance.
  disabled:
    description: Only applies if a target implementation makes the badge interactive.
props:
  children:
    type: node
    required: true
    description: Visible badge label.
  variant:
    type: enum
    values: [default, brand, success, warning, error, info, gold, purple, outline]
    default: default
  size:
    type: enum
    values: [xs, sm, md]
    default: sm
  dot:
    type: boolean
    default: false
  icon:
    type: node
    default: null
  onRemove:
    type: function
    default: null
content_guidelines:
  - Use one to three words where possible.
  - Prefer sentence case unless the label is a proper name or product term.
  - Do not make a badge carry the only explanation of an important state.
accessibility:
  role: none
  keyboard:
    - Badge itself is static unless it includes a remove button.
  requirements:
    - Remove affordance must be a native button.
    - Remove button needs an accessible label that identifies what will be removed.
    - Dot and color meaning must also be available through text.
translation_notes:
  - Target frameworks should map variants to semantic status and recognition tokens.
  - Keep removable behavior optional.
  - Do not copy Tailwind classes as the contract.
open_questions:
  - Should removable badges expose a required removeLabel prop instead of a default label?
