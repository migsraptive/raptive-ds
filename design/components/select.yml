schema_version: 0.1
name: Select
status: draft
source:
  repo: community-ds
  path: src/components/Select/Select.jsx
purpose: >
  Select lets users choose one value from a compact list using native select
  behavior and the shared field label, helper, error, and shell structure.
use_when:
  - The user must choose one value from a known list.
  - Space is limited and showing every option would add too much visual weight.
  - Native select behavior is acceptable for the platform.
do_not_use_for:
  - Choices that need rich descriptions or comparison; use RadioGroup or OptionTile.
  - Multi-select choices; use Checkbox or a dedicated multi-select pattern.
  - Navigation menus.
agent_rules:
  - Prefer Select over native select in patterns.
  - Keep option labels concise.
  - Do not use Select when the user needs to compare all choices at once.
governance:
  component_contract:
    - Select is a black-box compact choice field.
    - Consumers may position Select from a parent layout only.
    - Consumers may not style Select internals or target shell, native select, indicator, label, helper, or error elements with CSS.
    - Consumers must not hard-code Select radius, spacing, typography, color, border, shadow, icon sizing, or state treatment.
  api_compatibility:
    - Existing implementation props are not automatically consumer-facing design contract options.
    - Pass-through attributes are allowed for accessibility, form behavior, ids, and data attributes.
    - className and style, when present in code, are restricted compatibility escape hatches, not styling APIs.
  escalate_when:
    - A choice field needs rich options, multi-select, search, or custom combobox behavior.
    - A consumer wants to override Select-owned visual styling.
    - Native select behavior is not sufficient for the product need.
anatomy:
  - name: field
    required: false
    description: Optional FormField wrapper.
  - name: shell
    required: true
    description: Shared single-line field container.
  - name: select
    required: true
    description: Native select control.
  - name: indicator
    required: true
    description: Decorative disclosure icon.
variants:
  default:
    description: Standard compact single-choice field.
    intent: compact_choice
states:
  default:
    description: Ready for selection.
  focus_visible:
    description: Focus is visible through the shell.
  error:
    description: Field is invalid and error text is shown.
  disabled:
    description: User cannot change the value.
  read_only:
    description: Value is visible but should not be changed.
props:
  id:
    type: string
    default: generated_when_wrapped
  label:
    type: node
    default: null
  description:
    type: node
    default: null
  error:
    type: node
    default: null
  required:
    type: boolean
    default: false
  optional:
    type: boolean
    default: false
  placeholder:
    type: string
    default: Select an option
  options:
    type: array
    item_shape:
      value: string
      label: string
    default: []
  className:
    type: string
    default: ''
    governance: restricted_compatibility_escape_hatch
    description: Present in the React implementation but not a consumer styling contract.
  selectClassName:
    type: string
    default: ''
    governance: restricted_compatibility_escape_hatch
    description: Present in the React implementation but not a consumer styling contract.
pass_through_props:
  governance: restricted_compatibility_escape_hatch
  allowed_for:
    - aria attributes
    - data attributes
    - id
    - name
    - disabled
    - readOnly
    - native select behavior
  not_allowed_for:
    - overriding visual internals
    - replacing documented variants
    - adding undocumented styling hooks
traceability:
  control:
    data-ds-component: Select
    data-ds-variant: default
    data-ds-size: md
  static_contract:
    variants: [default]
    sizes: [md]
  flow_correlation:
    allowed:
      - data-ds-role
      - data-ds-instance
content_guidelines:
  - Use short option labels.
  - Placeholder should prompt selection, not describe the entire field.
  - Helper text should explain the choice only when labels cannot.
accessibility:
  role: combobox
  keyboard:
    - Native select keyboard behavior.
  requirements:
    - Use a visible label when the field is part of a form flow.
    - Preserve aria-describedby and aria-invalid from FormField.
    - Decorative indicator must not replace native select semantics.
translation_notes:
  - Target frameworks should keep native select behavior unless a custom combobox is explicitly approved.
  - Do not copy Tailwind classes as the contract.
open_questions:
  - Should disabled options be part of the option item shape?
