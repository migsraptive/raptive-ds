schema_version: 0.1
name: Button
status: pilot
source:
  repo: community-ds
  path: src/components/Button/Button.jsx
  intent_path: src/components/Button/intent.md
purpose: >
  Button triggers an immediate user action, submits a step, or opens a
  controlled surface. It communicates action hierarchy and can show in-place
  loading or success feedback after the user activates it.
use_when:
  - The user is committing an action in the current view.
  - The action needs button keyboard behavior.
  - The action can be disabled, loading, or completed in place.
do_not_use_for:
  - Navigation that should preserve link behavior; use TextLink or a routed link.
  - Persistent selected state; use OptionTile, Checkbox, RadioGroup, or SegmentedControl.
  - Inline body-copy links.
  - Menu items inside composite widgets.
agent_rules:
  - Do not invent new visual variants. Ask for design review if the available variants do not fit.
  - Do not style Button internals from a consuming surface.
  - Use at most one primary action in a local decision area unless a design explicitly calls for more.
  - Use the paired-label-icon utility for label-adjacent icons.
governance:
  component_contract:
    - Button is a black-box action component.
    - Consumers may position Button from a parent layout only.
    - Consumers may not style Button internals or target internal elements with CSS.
    - Consumers must not hard-code Button radius, spacing, typography, color, border, shadow, icon sizing, or state treatment.
    - Consumers must use documented variants for visual hierarchy and product meaning.
  api_compatibility:
    - Existing implementation props are not automatically consumer-facing design contract options.
    - Pass-through attributes are allowed for accessibility, form behavior, ids, and data attributes.
    - className and style, when present in code, are restricted compatibility escape hatches, not styling APIs.
  escalate_when:
    - A new action hierarchy or semantic treatment seems necessary.
    - More than one primary action appears necessary in the same viewport or local decision area.
    - A consumer wants to override Button-owned visual styling.
anatomy:
  - name: root
    required: true
    description: Native button behavior with optional motion wrapper.
  - name: label
    required: true
    description: Visible action text or an accessible name for icon-only usage.
  - name: icon_before
    required: false
    description: Supporting icon before the label.
  - name: icon_after
    required: false
    description: Supporting icon after the label.
  - name: loading_indicator
    required: false
    description: Progress indicator shown while the action is running.
  - name: success_indicator
    required: false
    description: Caller-provided confirmation icon or success label.
variants:
  primary:
    description: Main action for a screen, modal, section, or final step.
    intent: highest_emphasis
  secondary:
    description: Alternative or follow-up action that should remain visible.
    intent: medium_emphasis
  ghost:
    description: Low-emphasis action where the surrounding layout already provides structure.
    intent: low_emphasis
  danger:
    description: Destructive or high-risk action.
    intent: destructive
  black:
    description: Brand-forward action for dark, editorial, or special launch moments.
    intent: special_emphasis
  link:
    description: Button behavior with text-link appearance for inline actions that are not navigation.
    intent: inline_action
  previewBrand:
    description: Primary preview action using validated dynamic brand colors.
    intent: dynamic_brand_primary
  previewAccent:
    description: Secondary preview action using validated dynamic brand colors.
    intent: dynamic_brand_secondary
sizes:
  xs:
    description: Dense utility action.
  sm:
    description: Compact action in crowded surfaces.
  md:
    description: Default action size.
  lg:
    description: High-emphasis action in spacious flow steps.
states:
  default:
    description: Ready for interaction.
  hover:
    description: Pointer feedback for enabled buttons.
  active:
    description: Pressed feedback during activation.
  focus_visible:
    description: Keyboard-visible focus state.
  disabled:
    description: Non-interactive state.
  loading:
    description: Action is in progress and cannot be activated again.
  success:
    description: Completed state shown after an action resolves.
props:
  children:
    type: node
    required: false
    description: Visible label content. Required unless an accessible label is supplied another way.
  variant:
    type: enum
    values: [primary, secondary, ghost, danger, black, link, previewBrand, previewAccent]
    default: primary
  size:
    type: enum
    values: [xs, sm, md, lg]
    default: md
  loading:
    type: boolean
    default: false
  loadingLabel:
    type: string
    default: null
  success:
    type: boolean
    default: false
  successLabel:
    type: string
    default: null
  successIcon:
    type: node
    default: null
  disabled:
    type: boolean
    default: false
  iconBefore:
    type: node
    default: null
  iconAfter:
    type: node
    default: null
  fullWidth:
    type: boolean
    default: false
  type:
    type: enum
    values: [button, submit, reset]
    default: button
  className:
    type: string
    default: ''
    governance: restricted_compatibility_escape_hatch
    description: Present in the React implementation but not a consumer styling contract.
pass_through_props:
  governance: restricted_compatibility_escape_hatch
  allowed_for:
    - aria attributes
    - data attributes
    - id
    - form attributes
    - native button behavior
  not_allowed_for:
    - overriding visual internals
    - replacing documented variants
    - adding undocumented styling hooks
traceability:
  root:
    data-ds-component: Button
    data-ds-variant: variant
    data-ds-size: size
  static_contract:
    variants: [primary, secondary, ghost, danger, black, link, previewBrand, previewAccent]
    sizes: [xs, sm, md, lg]
  flow_correlation:
    allowed:
      - data-ds-role
      - data-ds-instance
    guidance: >
      Use role and instance metadata to describe the Button's job in an
      organism, such as primary-action or creator-application.verify.primary.
      These values do not change the Button variant.
content_guidelines:
  - Use concise verb phrases.
  - Prefer the user's outcome over implementation language.
  - Keep loading and success labels understandable without animation.
accessibility:
  role: button
  keyboard:
    - Enter and Space activate native button behavior.
  requirements:
    - Use native disabled behavior when disabled, loading, or success locks the action.
    - Set aria-busy while loading.
    - Icon-only buttons require an explicit accessible label.
    - Loading and success states must not be the only way critical status is communicated.
translation_notes:
  - Target frameworks should wrap their native button primitive rather than copy Tailwind classes.
  - Map variants to local semantic action tokens.
  - Motion is optional; the loading, success, disabled, and focus states are required.
open_questions:
  - Should the black variant remain part of the portable contract or stay React-only?
  - Should previewBrand and previewAccent move into a separate brand-preview contract later?
