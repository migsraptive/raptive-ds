schema_version: 0.1
name: Button
status: pilot
source:
  repo: community-ds
  path: src/components/Button/Button.jsx
purpose: >
  Button triggers a user action, submits a step, or opens a controlled surface.
  It supports clear hierarchy, loading feedback, and optional icon content.
do_not_use_for:
  - Navigation that should behave as a link.
  - Toggle controls that need persistent pressed state unless aria-pressed is specified.
  - Menu items inside composite widgets.
anatomy:
  - name: root
    required: true
    description: Native button element or framework button primitive.
  - name: label
    required: true
    description: Visible action text.
  - name: icon_before
    required: false
    description: Decorative or supporting icon before the label.
  - name: icon_after
    required: false
    description: Decorative or supporting icon after the label.
  - name: loading_indicator
    required: false
    description: Spinner or equivalent progress indicator shown during loading state.
variants:
  primary:
    description: Main action on a screen or section.
    token_intent:
      background: color.action.primary
      text: color.text.inverse
      hover_background: color.action.primary.hover
  secondary:
    description: Secondary action with outlined treatment.
    token_intent:
      background: color.surface.default
      text: color.text.primary
      border: color.border.strong
  ghost:
    description: Low-emphasis action without a visible container until hover.
    token_intent:
      background: transparent
      text: color.text.primary
      hover_background: color.surface.sunken
  danger:
    description: Destructive or high-risk action.
    token_intent:
      background: color.action.danger
      text: color.text.inverse
  link:
    description: Inline action that visually behaves like text.
    token_intent:
      text: color.action.primary
sizes:
  xs:
    min_height: 24px
    inline_padding: spacing.xs
    typography: type.label.md
  sm:
    min_height: 32px
    inline_padding: spacing.xs
    typography: type.label.lg
  md:
    min_height: 44px
    inline_padding: spacing.s
    typography: type.label.lg
  lg:
    min_height: 56px
    inline_padding: spacing.s
    typography: type.body
states:
  default:
    description: Ready for interaction.
  hover:
    description: Pointer hover feedback.
  active:
    description: Pressed feedback.
  focus_visible:
    description: Keyboard-visible focus ring.
  disabled:
    description: Non-interactive state with reduced contrast.
  loading:
    description: Action is in progress; click interaction is disabled.
  success:
    description: Optional confirmation state after a successful action.
props:
  variant:
    type: enum
    values: [primary, secondary, ghost, danger, black, link]
    default: primary
  size:
    type: enum
    values: [xs, sm, md, lg]
    default: md
  loading:
    type: boolean
    default: false
  loadingLabel:
    type: string
    default: null
  success:
    type: boolean
    default: false
  successLabel:
    type: string
    default: null
  disabled:
    type: boolean
    default: false
  fullWidth:
    type: boolean
    default: false
content_guidelines:
  - Use a verb phrase when possible.
  - Keep labels short enough to scan.
  - Do not rely on icons alone unless an accessible label is supplied.
token_intent:
  radius:
    default: radius.pill
  spacing:
    icon_gap: spacing.xs
  typography:
    weight: medium
accessibility:
  role: button
  keyboard:
    - Enter and Space activate the button.
  requirements:
    - Use native disabled behavior when disabled or loading.
    - Set aria-busy when loading.
    - Icon-only buttons require an accessible label.
    - Loading and success labels must remain understandable without animation.
translation_notes:
  - Community implementation should prefer wrapping or extending Discourse DButton.
  - Do not port Tailwind classes.
  - Motion effects are optional; state clarity is required.
open_questions:
  - Should the Community target support the black variant in the first pilot?
  - Should success state be included in the first generated version or deferred?
